<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
   
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>Habit Tracker</title>
  </head>
  <body>
    <!-- React app will be rendered here -->
    <div id="root"></div>

    <!-- Optional theme toggle button (this can also be handled in React components) -->
    <button id="theme-toggle">Switch to Dark Mode</button>

    <!-- Optional Reset button -->
    <button id="reset-button" type="button">Reset Habits</button>

    <h1>Habit Tracker</h1>

    <h2>Habit List</h2>
    <ul id="habit-list">
      <!-- Dynamically generated by React -->
    </ul>

 
    <form id="habit-form">
      <input type="text" id="habit-name" placeholder="Habit Name" required />
      <button type="submit" id="add-habit-btn">Add Habit</button>
    </form>

    <!-- Fetch API example (optional, handled via React state in a component) -->
    <script>
      fetch("/api/test-users")
        .then((res) => res.json())
        .then((users) => console.log(users))
        .catch((err) => console.error("Failed to fetch:", err));
    </script>

    <!-- Link to the bundled React JavaScript file (main.js) -->
    <script src="%PUBLIC_URL%/js/main.js"></script>

    <noscript>You need to enable JavaScript to run this app.</noscript>
  </body>
</html>
