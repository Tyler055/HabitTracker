<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script src="./assets/js/script.js" defer></script>
</head>
<body>
    <div id="root"></div> <!-- React will render here -->

    <div class="container">
        <h2>Customize Your Theme</h2>

        <label for="bg-color">Background Color:</label>
        <input type="color" id="bg-color" value="#f0f0f0">

        <label for="text-color">Text Color:</label>
        <input type="color" id="text-color" value="#333">

        <label for="button-color">Button Color:</label>
        <input type="color" id="button-color" value="#007bff">

        <button onClick="setCustomColors()">Apply Theme</button>
        <button id="reset-button">Reset Habits</button>
    </div>

    <!-- React will render the app here -->
    <div id="habit-tracker-app"></div>
</body>
</html>
