<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/taskbar.css') }}" />

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='icon/website.ico') }}" type="image/x-icon" />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 18px;
            color: #666;
        }
        .habit-list {
            text-align: left;
            margin-top: 20px;
        }
        .habit-list label {
            display: block;
            font-size: 16px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Test Page</h1>
        <p>Your backend is working correctly!</p>
        <p>This is a simple, well-styled HTML page for testing purposes.</p>

        <h2>Habit List</h2>
        <div class="habit-list">
            <label><input type="checkbox"> Morning Exercise</label>
            <label><input type="checkbox"> Drink 8 Glasses of Water</label>
            <label><input type="checkbox"> Read for 30 Minutes</label>
            <label><input type="checkbox"> Meditation</label>
            <label><input type="checkbox"> No Junk Food</label>
            <label><input type="checkbox"> Learn a New Skill</label>
            <label><input type="checkbox"> Organize Workspace</label>
            <label><input type="checkbox"> Sleep Before 11 PM</label>
            <label><input type="checkbox"> Journal Your Thoughts</label>
            <label><input type="checkbox"> Social Media Detox</label>
        </div>
    </div>
</body>
</html>
