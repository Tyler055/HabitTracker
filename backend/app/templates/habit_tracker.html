{% extends 'base.html' %}

{% block content %}
    <h2>Habit Tracker</h2>

    <!-- Reset Habits Button -->
    <form action="{{ url_for('reset_habits') }}" method="POST">
        <button type="submit" class="reset-btn">Reset All Habits</button>
    </form>

    <h3>Your Habit List</h3>

    {% if habits %}
        
            {% for habit in habits %}
                
                    <span>{{ habit.name }}</span>
                    <!-- Form to delete a habit -->
                    <form action="{{ url_for('delete_habit', habit_id=habit.id) }}" method="POST" class="inline-form">
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No habits found. Start by adding a new one!</p>
    {% endif %}

    <!-- Form to Add a New Habit -->
    <h3>Add a New Habit</h3>
    <form action="{{ url_for('add_habit') }}" method="POST">
        <input type="text" name="habit_name" placeholder="Habit Name" required>
        <button type="submit" class="add-btn">Add Habit</button>
    </form>
{% endblock %}
